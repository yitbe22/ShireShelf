<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Merriweather&family=Inter&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="styles.css">
    <title>ShireShelf</title>
    <script src="https://kit.fontawesome.com/7a53aa822c.js" crossorigin="anonymous"></script>
</head>
<body>
    <h1>The Shire Shelf</h1>

    <div class="library">

        <div class="book-modal"  hidden>
        <form id="book-form">
            <input type="text" id="title" placeholder="Title">
            <input type="text" id="author" placeholder="Author">
            <input type="number" id="pages" placeholder="Pages">

            <label>
              <input type="checkbox" id="read">
              Read
            </label>

            <button type="submit" id="submit">Save Book</button>
        </form>
    </div>
        
  <div class="shelf-container">
        <div class="books-row" id="books-row">
            <div class="book">
                <p class="title">THE HOBBIT</p>
                <div class="bar"></div>
                <h6 class="author">J.K</h6>
            </div>
            <div class="book">
                 <p class="title">Atomic Habits</p>
                <div class="bar"></div>
                <h6 class="author">J.K</h6>
            </div>
            
        </div>
        <div class="shelf"></div>
  </div>
  <div class="shelf-container">
        <div class="books-row">
            
        </div>
        <div class="shelf"></div>
  </div>
  

   <button id="addBtn"><i class="fa-solid fa-circle-plus"></i>Add</button>

</div>

    
    
   
   
    
    <script src="main.js"></script>
</body>
</html>
